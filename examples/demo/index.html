<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>urath</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #060608;
    --surface: rgba(255, 255, 255, 0.03);
    --border: rgba(255, 255, 255, 0.06);
    --text-primary: rgba(255, 255, 255, 0.87);
    --text-secondary: rgba(255, 255, 255, 0.4);
    --text-dim: rgba(255, 255, 255, 0.18);
    --accent: #7fcc81;
    --accent-dim: rgba(127, 204, 129, 0.15);
    --mono: 'JetBrains Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--mono);
  }

  canvas { display: block; }

  #scene-container {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* ── Overlay UI ────────────────────────────────── */

  .overlay {
    position: fixed;
    z-index: 10;
    pointer-events: none;
  }

  .overlay * {
    pointer-events: auto;
  }

  /* Top-left: title block */
  .header {
    top: 28px;
    left: 32px;
  }

  .header h1 {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-primary);
    line-height: 1;
    margin-bottom: 8px;
  }

  .header h1 span {
    color: var(--accent);
  }

  .header .tagline {
    font-family: var(--sans);
    font-weight: 300;
    font-style: italic;
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.5;
    max-width: 280px;
  }

  /* Bottom-left: stats panel */
  .stats-panel {
    bottom: 28px;
    left: 32px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 2px;
  }

  .stat-cell {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 10px 14px;
    min-width: 120px;
  }

  .stat-cell:first-child { border-radius: 6px 0 0 0; }
  .stat-cell:nth-child(2) { border-radius: 0 6px 0 0; }
  .stat-cell:nth-child(3) { border-radius: 0 0 0 6px; }
  .stat-cell:last-child { border-radius: 0 0 6px 0; }

  .stat-label {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  .stat-value {
    font-size: 16px;
    font-weight: 300;
    color: var(--text-primary);
    font-variant-numeric: tabular-nums;
  }

  .stat-value .unit {
    font-size: 10px;
    color: var(--text-secondary);
    margin-left: 2px;
  }

  /* Bottom-right: tech badge */
  .tech-badge {
    bottom: 28px;
    right: 32px;
    text-align: right;
  }

  .tech-badge .engine {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .tech-stack {
    display: flex;
    gap: 6px;
    justify-content: flex-end;
  }

  .tech-tag {
    font-size: 10px;
    font-weight: 400;
    padding: 3px 8px;
    border-radius: 3px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-secondary);
  }

  .tech-tag.highlight {
    border-color: var(--accent-dim);
    color: var(--accent);
    background: rgba(127, 204, 129, 0.04);
  }

  /* ── Loading state ─────────────────────────────── */

  .loading-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    transition: opacity 0.6s ease, visibility 0.6s ease;
  }

  .loading-overlay.hidden {
    opacity: 0;
    visibility: hidden;
  }

  .loading-text {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }

  .loading-bar {
    width: 120px;
    height: 1px;
    background: var(--border);
    position: relative;
    overflow: hidden;
  }

  .loading-bar::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    animation: load-sweep 1.2s ease-in-out infinite;
    transform-origin: left;
  }

  @keyframes load-sweep {
    0%   { transform: scaleX(0); translate: 0; }
    50%  { transform: scaleX(0.6); translate: 0; }
    100% { transform: scaleX(0); translate: 120px; }
  }

  /* ── Fade-in for UI ────────────────────────────── */

  .overlay {
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.8s ease 0.3s, transform 0.8s ease 0.3s;
  }

  body.ready .overlay {
    opacity: 1;
    transform: translateY(0);
  }

  body.ready .stats-panel {
    transition-delay: 0.5s;
  }

  body.ready .tech-badge {
    transition-delay: 0.7s;
  }
</style>

<script type="importmap">

<div class="overlay stats-panel">

    <span class="tech-tag">Greedy Mesher</span>

</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import init, { WasmChunk, WasmChunkNeighbors, WasmGreedyMesher } from './pkg/urath_wasm.js';

// Face direction constants matching Rust Face enum
const FACE_POS_X = 0;
const FACE_NEG_X = 1;
const FACE_POS_Z = 4;
const FACE_NEG_Z = 5;

// ── Constants ──────────────────────────────────────
const CHUNK_SIZE = 32;
const RENDER_DISTANCE = 6;       // chunks from camera center
const UNLOAD_DISTANCE = 8;       // chunks before disposal
const CHUNKS_PER_FRAME = 3;      // max chunks to gen/mesh per frame

// ── Block IDs ─────────────────────────────────────
const BLOCK_AIR    = 0;
const BLOCK_STONE  = 1;
const BLOCK_DIRT   = 2;
const BLOCK_GRASS  = 3;
const BLOCK_SAND   = 4;
const BLOCK_WATER  = 5;
const BLOCK_SNOW   = 6;
const BLOCK_GRAVEL = 7;
const BLOCK_LOG    = 8;
const BLOCK_LEAVES = 9;

// ── Hash-based noise ──────────────────────────────
// Self-contained value noise — no external deps needed.
function _hash(x, y) {
  let h = (x * 374761393 + y * 668265263 + 1376312589) | 0;
  h = Math.imul(h ^ (h >>> 13), 1274126177);
  h = h ^ (h >>> 16);
  return (h & 0x7fffffff) / 0x7fffffff; // 0..1
}

function _hash3(x, y, z) {
  let h = (x * 374761393 + y * 668265263 + z * 1274126177 + 1376312589) | 0;
  h = Math.imul(h ^ (h >>> 13), 2246822519);
  h = h ^ (h >>> 16);
  return (h & 0x7fffffff) / 0x7fffffff;
}

function _lerp(a, b, t) { return a + (b - a) * t; }
function _smooth(t) { return t * t * (3 - 2 * t); }

function noise2d(x, y) {
  const ix = Math.floor(x), iy = Math.floor(y);
  const fx = _smooth(x - ix), fy = _smooth(y - iy);
  return _lerp(
    _lerp(_hash(ix, iy),     _hash(ix + 1, iy),     fx),
    _lerp(_hash(ix, iy + 1), _hash(ix + 1, iy + 1), fx),
    fy
  );
}

function noise3d(x, y, z) {
  const ix = Math.floor(x), iy = Math.floor(y), iz = Math.floor(z);
  const fx = _smooth(x - ix), fy = _smooth(y - iy), fz = _smooth(z - iz);
  return _lerp(
    _lerp(
      _lerp(_hash3(ix, iy, iz),     _hash3(ix+1, iy, iz),     fx),
      _lerp(_hash3(ix, iy+1, iz),   _hash3(ix+1, iy+1, iz),   fx), fy),
    _lerp(
      _lerp(_hash3(ix, iy, iz+1),   _hash3(ix+1, iy, iz+1),   fx),
      _lerp(_hash3(ix, iy+1, iz+1), _hash3(ix+1, iy+1, iz+1), fx), fy),
    fz
  );
}

function fbm2d(x, y, octaves) {
  let val = 0, amp = 1, freq = 1, max = 0;
  for (let i = 0; i < octaves; i++) {
    val += noise2d(x * freq, y * freq) * amp;
    max += amp;
    amp *= 0.5;
    freq *= 2;
  }
  return val / max;
}

function fbm3d(x, y, z, octaves) {
  let val = 0, amp = 1, freq = 1, max = 0;
  for (let i = 0; i < octaves; i++) {
    val += noise3d(x * freq, y * freq, z * freq) * amp;
    max += amp;
    amp *= 0.5;
    freq *= 2;
  }
  return val / max;
}

// ── Biome system ──────────────────────────────────
// Temperature and moisture fields drive biome selection.
const SEA_LEVEL = 10;

// Returns: { biome, baseHeight }
function getBiome(wx, wz) {
  const temp     = fbm2d(wx * 0.004 + 100, wz * 0.004 + 100, 4);   // 0..1
  const moisture = fbm2d(wx * 0.005 - 200, wz * 0.005 + 300, 4);   // 0..1

  // Continental shape: broad, slow undulation
  const continent = fbm2d(wx * 0.006, wz * 0.006, 5);
  // Detail noise adds local roughness
  const detail    = fbm2d(wx * 0.03, wz * 0.03, 3);

  if (temp > 0.6 && moisture < 0.35) {
    // ── Desert ──
    const h = SEA_LEVEL + 1 + Math.floor((continent * 4) + detail * 2);
    return { biome: 'desert', height: Math.min(h, CHUNK_SIZE - 1) };
  }

  if (temp < 0.3) {
    // ── Mountains ──
    const ridge = Math.abs(noise2d(wx * 0.012 + 500, wz * 0.012 + 500) - 0.5) * 2; // 0..1
    const h = SEA_LEVEL + 4 + Math.floor(continent * 12 + ridge * 14 + detail * 3);
    return { biome: 'mountain', height: Math.min(h, CHUNK_SIZE - 1) };
  }

  if (moisture > 0.55) {
    // ── Forest ──
    const h = SEA_LEVEL + 2 + Math.floor(continent * 8 + detail * 4);
    return { biome: 'forest', height: Math.min(h, CHUNK_SIZE - 1) };
  }

  // ── Plains ──
  const h = SEA_LEVEL + 1 + Math.floor(continent * 6 + detail * 3);
  return { biome: 'plains', height: Math.min(h, CHUNK_SIZE - 1) };
}

// ── Terrain generation ─────────────────────────────
function generateChunkData(cx, cz) {
  const chunk = WasmChunk.new_default();
  const ox = cx * CHUNK_SIZE;
  const oz = cz * CHUNK_SIZE;

  // First pass: terrain + caves + water
  for (let lz = 0; lz < CHUNK_SIZE; lz++) {
    for (let lx = 0; lx < CHUNK_SIZE; lx++) {
      const wx = ox + lx;
      const wz = oz + lz;
      const { biome, height } = getBiome(wx, wz);

      for (let y = 0; y < height; y++) {
        // Cave carving with 3D noise
        if (y > 0 && y < height - 1) {
          const cave = fbm3d(wx * 0.05, y * 0.07, wz * 0.05, 3);
          if (cave > 0.62) continue; // carve cave
        }

        let blockId;
        if (biome === 'desert') {
          blockId = y < height - 4 ? BLOCK_STONE : BLOCK_SAND;
        } else if (biome === 'mountain') {
          if (y < height - 2) blockId = BLOCK_STONE;
          else if (height > 24) blockId = BLOCK_SNOW;
          else if (height > 18) blockId = BLOCK_GRAVEL;
          else blockId = BLOCK_STONE;
        } else {
          // Plains / Forest
          if (y < height - 3) blockId = BLOCK_STONE;
          else if (y < height - 1) blockId = BLOCK_DIRT;
          else {
            // Beach sand near water
            blockId = (height <= SEA_LEVEL + 2) ? BLOCK_SAND : BLOCK_GRASS;
          }
        }
        chunk.set_block(lx, y, lz, blockId);
      }

      // Water fill
      for (let y = height; y < SEA_LEVEL; y++) {
        chunk.set_block(lx, y, lz, BLOCK_WATER);
      }
    }
  }

  // Second pass: trees (forest & plains biomes)
  // Use deterministic hash per column so trees are consistent across chunks
  for (let lz = 2; lz < CHUNK_SIZE - 2; lz++) {
    for (let lx = 2; lx < CHUNK_SIZE - 2; lx++) {
      const wx = ox + lx;
      const wz = oz + lz;
      const { biome, height } = getBiome(wx, wz);

      if (height <= SEA_LEVEL + 2) continue; // no trees on beaches / underwater

      const treeDensity = biome === 'forest' ? 0.93 : biome === 'plains' ? 0.985 : 1.0;
      if (_hash(wx * 7 + 1337, wz * 13 + 7331) > treeDensity) continue;

      // Don't place trees where surface isn't grass
      if (chunk.get_block(lx, height - 1, lz) !== BLOCK_GRASS) continue;

      const trunkH = 4 + Math.floor(_hash(wx + 42, wz + 99) * 3); // 4-6 blocks
      const topY = height + trunkH;
      if (topY >= CHUNK_SIZE - 2) continue;

      // Trunk
      for (let ty = height; ty < topY; ty++) {
        chunk.set_block(lx, ty, lz, BLOCK_LOG);
      }

      // Leaf canopy (sphere-ish)
      const leafR = 2;
      for (let dy = -1; dy <= 2; dy++) {
        const ly = topY + dy;
        if (ly < 0 || ly >= CHUNK_SIZE) continue;
        const r = dy === 2 ? 1 : leafR;
        for (let dxx = -r; dxx <= r; dxx++) {
          for (let dzz = -r; dzz <= r; dzz++) {
            if (dxx * dxx + dzz * dzz > r * r + 1) continue;
            const fx = lx + dxx, fz = lz + dzz;
            if (fx < 0 || fx >= CHUNK_SIZE || fz < 0 || fz >= CHUNK_SIZE) continue;
            if (chunk.get_block(fx, ly, fz) === BLOCK_AIR) {
              chunk.set_block(fx, ly, fz, BLOCK_LEAVES);
            }
          }
        }
      }
    }
  }

  return chunk;
}

// ── Shader material ────────────────────────────────
function createTerrainMaterial() {
  return new THREE.ShaderMaterial({
    vertexShader: /* glsl */ `
      attribute float ao;
      attribute float blockId;
      varying float vAo;
      varying float vBlockId;
      varying vec3 vNormal;
      varying vec3 vWorldPos;

      void main() {
        vAo = ao;
        vBlockId = blockId;
        vNormal = normalMatrix * normal;
        vec4 wp = modelMatrix * vec4(position, 1.0);
        vWorldPos = wp.xyz;
        gl_Position = projectionMatrix * viewMatrix * wp;
      }
    `,
    fragmentShader: /* glsl */ `
      uniform vec3 uCameraTarget;
      varying float vAo;
      varying float vBlockId;
      varying vec3 vNormal;
      varying vec3 vWorldPos;

      // Simple hash for per-block variation
      float hash(vec2 p) {
        return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
      }

      void main() {
        int bid = int(vBlockId + 0.5);

        // Per-block colors
        vec3 stone  = vec3(0.34, 0.33, 0.35);
        vec3 dirt   = vec3(0.45, 0.32, 0.22);
        vec3 grass  = vec3(0.30, 0.55, 0.22);
        vec3 sand   = vec3(0.76, 0.70, 0.50);
        vec3 water  = vec3(0.18, 0.35, 0.55);
        vec3 snow   = vec3(0.85, 0.87, 0.90);
        vec3 gravel = vec3(0.42, 0.40, 0.38);
        vec3 log    = vec3(0.36, 0.24, 0.14);
        vec3 leaves = vec3(0.20, 0.48, 0.16);

        vec3 color;
        if (bid == 1) color = stone;
        else if (bid == 2) color = dirt;
        else if (bid == 3) {
          // Grass: green top, dirt sides
          float isTop = step(0.9, dot(normalize(vNormal), vec3(0.0, 1.0, 0.0)));
          color = mix(dirt, grass, isTop);
        }
        else if (bid == 4) color = sand;
        else if (bid == 5) color = water;
        else if (bid == 6) color = snow;
        else if (bid == 7) color = gravel;
        else if (bid == 8) color = log;
        else if (bid == 9) color = leaves;
        else color = vec3(1.0, 0.0, 1.0); // debug magenta

        // Subtle per-block variation so it doesn't look flat
        float variation = hash(floor(vWorldPos.xz)) * 0.06 - 0.03;
        color += variation;

        // Lighting
        vec3 lightDir = normalize(vec3(0.4, 0.8, 0.3));
        float ndotl = dot(normalize(vNormal), lightDir);
        float diffuse = 0.35 + 0.65 * max(ndotl, 0.0);

        float aoFactor = 0.55 + 0.45 * vAo;
        float skyFill = 0.08 * max(dot(normalize(vNormal), vec3(0.0, 1.0, 0.0)), 0.0);

        color *= (diffuse * aoFactor + skyFill);

        // Water gets slight translucency vibe via desaturation
        if (bid == 5) {
          color *= 0.85;
          color += vec3(0.02, 0.04, 0.08);
        }

        // Fog centered on camera target
        float dist = length(vWorldPos.xz - uCameraTarget.xz);
        float fogStart = ${(RENDER_DISTANCE * CHUNK_SIZE * 0.5).toFixed(1)};
        float fogEnd = ${(RENDER_DISTANCE * CHUNK_SIZE * 0.85).toFixed(1)};
        float fog = 1.0 - smoothstep(fogStart, fogEnd, dist);
        vec3 fogColor = vec3(0.024, 0.024, 0.03);
        color = mix(fogColor, color, fog);

        gl_FragColor = vec4(color, 1.0);
      }
    `,
    uniforms: {
      uCameraTarget: { value: new THREE.Vector3() },
    },
    side: THREE.FrontSide,
  });
}

// ── Build geometry from mesh result ────────────────
function buildGeometry(meshResult) {
  const positions = meshResult.positions();
  const normals = meshResult.normals();
  const aoData = meshResult.ao();
  const blockIds = meshResult.block_ids();
  const indices = meshResult.indices();

  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geometry.setAttribute('normal', new THREE.BufferAttribute(normals, 3));
  geometry.setAttribute('ao', new THREE.BufferAttribute(aoData, 1));
  geometry.setAttribute('blockId', new THREE.BufferAttribute(blockIds, 1));
  geometry.setIndex(new THREE.BufferAttribute(indices, 1));
  geometry.computeBoundingBox();

  return geometry;
}

// ── Scene setup ────────────────────────────────────
function createScene(container) {
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x060608);
  container.appendChild(renderer.domElement);

  const scene = new THREE.Scene();

  const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.5, 500);
  camera.position.set(55, 45, 60);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 10, 0);
  controls.enableDamping = true;
  controls.dampingFactor = 0.06;
  controls.minDistance = 15;
  controls.maxDistance = 200;
  controls.maxPolarAngle = Math.PI * 0.48;
  controls.update();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  return { renderer, scene, camera, controls };
}

// ── Keyboard movement ──────────────────────────────
class KeyboardMover {
  constructor(controls, camera) {
    this.controls = controls;
    this.camera = camera;
    this.keys = {};
    this.speed = 80; // world units per second

    window.addEventListener('keydown', (e) => {
      this.keys[e.code] = true;
    });
    window.addEventListener('keyup', (e) => {
      this.keys[e.code] = false;
    });
  }

  update(dt) {
    if (dt <= 0 || dt > 0.1) return; // skip large gaps

    const move = new THREE.Vector3();

    // Get camera's forward direction projected onto XZ plane
    const forward = new THREE.Vector3();
    this.camera.getWorldDirection(forward);
    forward.y = 0;
    forward.normalize();

    // Right vector
    const right = new THREE.Vector3();
    right.crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize();

    // WASD / Arrow keys for horizontal movement
    if (this.keys['KeyW'] || this.keys['ArrowUp'])    move.add(forward);
    if (this.keys['KeyS'] || this.keys['ArrowDown'])   move.sub(forward);
    if (this.keys['KeyD'] || this.keys['ArrowRight'])  move.add(right);
    if (this.keys['KeyA'] || this.keys['ArrowLeft'])   move.sub(right);

    // Space / Shift for vertical
    if (this.keys['Space'])    move.y += 1;
    if (this.keys['ShiftLeft'] || this.keys['ShiftRight']) move.y -= 1;

    if (move.lengthSq() === 0) return;

    move.normalize().multiplyScalar(this.speed * dt);

    // Move both target and camera together
    this.controls.target.add(move);
    this.camera.position.add(move);
  }
}

// ── Stats display ──────────────────────────────────
function updateStats(chunks, vertices, triangles, pending) {
  const fmt = (n) => n.toLocaleString();
  document.getElementById('stat-chunks').innerHTML = fmt(chunks);
  document.getElementById('stat-verts').innerHTML = fmt(vertices);
  document.getElementById('stat-tris').innerHTML = fmt(triangles);
  document.getElementById('stat-time').innerHTML = pending > 0 ? fmt(pending) : '0';
}

// ── Chunk Manager ──────────────────────────────────
class ChunkManager {
  constructor(scene, material, mesher) {
    this.scene = scene;
    this.material = material;
    this.mesher = mesher;

    // chunkData: Map<key, WasmChunk>  — keeps voxel data alive for neighbor lookups
    this.chunkData = new Map();
    // chunkMeshes: Map<key, THREE.Mesh>
    this.chunkMeshes = new Map();
    // pending: Set<key> — chunks queued for generation
    this.pending = new Set();

    this.totalVerts = 0;
    this.totalTris = 0;
  }

  key(cx, cz) { return `${cx},${cz}`; }

  update(cameraCX, cameraCZ) {
    // 1. Determine which chunks should be loaded
    const needed = new Set();
    for (let dz = -RENDER_DISTANCE; dz <= RENDER_DISTANCE; dz++) {
      for (let dx = -RENDER_DISTANCE; dx <= RENDER_DISTANCE; dx++) {
        if (dx * dx + dz * dz > RENDER_DISTANCE * RENDER_DISTANCE) continue;
        needed.add(this.key(cameraCX + dx, cameraCZ + dz));
      }
    }

    // 2. Queue missing chunks
    for (const k of needed) {
      if (!this.chunkData.has(k) && !this.pending.has(k)) {
        this.pending.add(k);
      }
    }

    // 3. Process a batch of pending chunks (generate data)
    let processed = 0;
    for (const k of this.pending) {
      if (processed >= CHUNKS_PER_FRAME) break;
      const [cx, cz] = k.split(',').map(Number);
      this.chunkData.set(k, generateChunkData(cx, cz));
      this.pending.delete(k);
      processed++;

      // Mesh this chunk + re-mesh affected neighbors
      this._meshChunk(cx, cz);
      this._remeshNeighbors(cx, cz);
    }

    // 4. Unload distant chunks
    for (const [k] of this.chunkData) {
      if (!needed.has(k)) {
        const [cx, cz] = k.split(',').map(Number);
        const dx = cx - cameraCX;
        const dz = cz - cameraCZ;
        if (dx * dx + dz * dz > UNLOAD_DISTANCE * UNLOAD_DISTANCE) {
          this._unloadChunk(k);
        }
      }
    }
  }

  _meshChunk(cx, cz) {
    const k = this.key(cx, cz);
    const chunk = this.chunkData.get(k);
    if (!chunk) return;

    // Remove old mesh if exists
    this._removeMesh(k);

    // Build neighbors
    const neighbors = new WasmChunkNeighbors(CHUNK_SIZE);
    const px = this.chunkData.get(this.key(cx + 1, cz));
    const nx = this.chunkData.get(this.key(cx - 1, cz));
    const pz = this.chunkData.get(this.key(cx, cz + 1));
    const nz = this.chunkData.get(this.key(cx, cz - 1));
    if (px) neighbors.set_neighbor(FACE_POS_X, px);
    if (nx) neighbors.set_neighbor(FACE_NEG_X, nx);
    if (pz) neighbors.set_neighbor(FACE_POS_Z, pz);
    if (nz) neighbors.set_neighbor(FACE_NEG_Z, nz);

    const result = this.mesher.mesh_with_neighbors(chunk, neighbors);

    if (!result.is_empty()) {
      const geometry = buildGeometry(result);
      const mesh = new THREE.Mesh(geometry, this.material);
      mesh.position.set(cx * CHUNK_SIZE, 0, cz * CHUNK_SIZE);
      this.scene.add(mesh);
      this.chunkMeshes.set(k, mesh);
      this.totalVerts += result.vertex_count();
      this.totalTris += result.index_count() / 3;
    }

    result.free();
    neighbors.free();
  }

  _remeshNeighbors(cx, cz) {
    // When a new chunk is loaded, its 4 neighbors need re-meshing
    // to cull the newly shared boundary faces
    for (const [dx, dz] of [[1,0],[-1,0],[0,1],[0,-1]]) {
      const nk = this.key(cx + dx, cz + dz);
      if (this.chunkData.has(nk) && this.chunkMeshes.has(nk)) {
        this._meshChunk(cx + dx, cz + dz);
      }
    }
  }

  _removeMesh(k) {
    const existing = this.chunkMeshes.get(k);
    if (existing) {
      this.totalVerts -= existing.geometry.getAttribute('position').count;
      this.totalTris -= existing.geometry.index.count / 3;
      this.scene.remove(existing);
      existing.geometry.dispose();
      this.chunkMeshes.delete(k);
    }
  }

  _unloadChunk(k) {
    this._removeMesh(k);
    const chunk = this.chunkData.get(k);
    if (chunk) {
      chunk.free();
      this.chunkData.delete(k);
    }
  }
}

// ── Main ───────────────────────────────────────────
async function main() {
  await init();

  const container = document.getElementById('scene-container');
  const { renderer, scene, camera, controls } = createScene(container);

  const material = createTerrainMaterial();
  const mesher = new WasmGreedyMesher(CHUNK_SIZE);
  const chunkManager = new ChunkManager(scene, material, mesher);
  const mover = new KeyboardMover(controls, camera);

  // Hide loading, reveal UI
  document.getElementById('loading').classList.add('hidden');
  document.body.classList.add('ready');

  let lastCameraCX = null;
  let lastCameraCZ = null;
  let lastTime = performance.now();

  function animate() {
    requestAnimationFrame(animate);

    const now = performance.now();
    const dt = (now - lastTime) / 1000;
    lastTime = now;

    mover.update(dt);
    controls.update();

    // Determine camera chunk position from orbit target
    const target = controls.target;
    const cameraCX = Math.floor(target.x / CHUNK_SIZE);
    const cameraCZ = Math.floor(target.z / CHUNK_SIZE);

    // Update fog center
    material.uniforms.uCameraTarget.value.copy(target);

    // Always tick the manager (processes pending queue)
    // but only re-evaluate needed set when camera chunk changes
    if (cameraCX !== lastCameraCX || cameraCZ !== lastCameraCZ || chunkManager.pending.size > 0) {
      chunkManager.update(cameraCX, cameraCZ);
      lastCameraCX = cameraCX;
      lastCameraCZ = cameraCZ;
      updateStats(chunkManager.chunkMeshes.size, chunkManager.totalVerts, chunkManager.totalTris, chunkManager.pending.size);
    }

    renderer.render(scene, camera);
  }
  animate();
}

main().catch(err => {
  console.error('Failed to initialize:', err);
  document.querySelector('.loading-text').textContent = 'Error — check console';
});
</script>
